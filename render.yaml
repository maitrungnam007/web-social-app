# Render Blueprint File
# https://render.com/docs/blueprint-spec

databases:
  - name: interacthub-db
    databaseName: interacthub
    user: interacthub_user
    plan: free

services:
  - type: web
    name: interacthub-api
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: interacthub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://web-social-app.vercel.app
